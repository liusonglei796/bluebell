<style>
  :root {
    --glass-bg: rgba(255, 255, 255, 0.6); /* Reduced opacity */
    --glass-border: rgba(255, 255, 255, 0.2); /* Softened highlight */
    --blur-amount: 20px;
    --accent-black: #000000;
    --bg-gradient: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
  }
  
  .glass-body {
    background: var(--bg-gradient);
    background-attachment: fixed;
    min-height: 80vh;
    padding: 2rem;
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--accent-black);
  }
  
  .glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(var(--blur-amount));
    -webkit-backdrop-filter: blur(var(--blur-amount));
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 1.5rem;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    margin-bottom: 1.5rem;
    transition: transform 0.3s ease; /* No shadow change to avoid flicker */
    transform: translateZ(0); /* Hardware acceleration */
  }
  
  .glass-card:hover {
    transform: translateY(-4px);
    /* Shadow removed to prevent 'glaring' effect */
  }
  
  .nav-glass {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(30px);
    border: 1px solid var(--glass-border);
    padding: 0.8rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 100px;
    margin-bottom: 2.5rem;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
  }
  
  .logo-black {
    font-size: 1.5rem;
    font-weight: 900;
    color: #000;
    letter-spacing: -1.5px;
  }
  
  .btn-black {
    background: #000;
    color: #fff;
    padding: 0.6rem 1.4rem;
    border-radius: 50px;
    font-weight: 700;
    border: none;
  }

  .tag-mono {
    background: rgba(0, 0, 0, 0.04);
    color: #000;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 800;
    text-transform: uppercase;
  }
</style>

<div class="glass-body">
  <div style="text-align: center; margin-bottom: 2rem; color: #888; font-weight: 600; font-size: 0.8rem; letter-spacing: 2px;">FIXED: NO GLARE / HARDWARE ACCELERATED</div>
  
  <div class="nav-glass">
    <div class="logo-black">BLUEBELL</div>
    <div style="display: flex; gap: 2rem; align-items: center;">
      <span style="font-weight: 900; color: #000;">HOME</span>
      <span style="color: #888; font-weight: 700;">TRENDING</span>
      <button class="btn-black">CREATE</button>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: 2.5fr 1fr; gap: 2.5rem;">
    <div>
      <div class="glass-card">
        <div style="display: flex; gap: 1.5rem;">
          <div style="display: flex; flex-direction: column; align-items: center; background: rgba(0, 0, 0, 0.03); padding: 0.8rem; border-radius: 16px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3"><path d="M18 15l-6-6-6 6"/></svg>
            <span style="font-weight: 900; color: #000; margin: 4px 0;">1.2k</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <div style="flex-grow: 1;">
            <div style="display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.8rem;">
              <span class="tag-mono">Engineering</span>
              <span style="color: #aaa; font-size: 0.75rem; font-weight: 600;">by @alex_dev</span>
            </div>
            <div style="font-size: 1.4rem; font-weight: 900; color: #000; margin-bottom: 0.5rem; letter-spacing: -0.5px;">Refining Monochrome Glassmorphism</div>
            <p style="color: #666; line-height: 1.6; font-size: 0.95rem; font-weight: 500;">
              By reducing border opacity and forcing GPU acceleration, we've eliminated the 'white light' artifacts during transitions...
            </p>
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="glass-card">
        <h3 style="margin-top:0; font-weight: 900; font-size: 1rem; letter-spacing: 1px;">TOP COMMUNITIES</h3>
        <div style="margin-top: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
          <div style="display: flex; align-items: center; gap: 1rem;">
            <div style="width: 32px; height: 32px; border-radius: 8px; background: #000;"></div>
            <span style="font-weight: 700; font-size: 0.9rem;">r/Golang</span>
          </div>
          <div style="display: flex; align-items: center; gap: 1rem;">
            <div style="width: 32px; height: 32px; border-radius: 8px; background: #333;"></div>
            <span style="font-weight: 700; font-size: 0.9rem;">r/VueJS</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
