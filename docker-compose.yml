# ============================================
# 生产单机部署 (Single Server Production)
# 包含完整服务栈: Go 后端 + 前端 + Nginx + 基础设施
# 使用: docker compose up -d
# ============================================
services:
  mysql:
    image: mysql:8.0
    container_name: bluebell_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 15939087780Ll@
      MYSQL_DATABASE: bluebell
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    restart: always
    networks:
      - bluebell_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 5

  redis:
    image: redis:alpine
    container_name: bluebell_redis
    volumes:
      - ./data/redis:/data
    restart: always
    networks:
      - bluebell_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bluebell_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: bluebell
      RABBITMQ_DEFAULT_PASS: bluebell123
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    networks:
      - bluebell_net
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: bluebell_elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - bluebell_net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Go 后端应用
  bluebell:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bluebell_app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bluebell_net
    restart: always
    env_file:
      - path: .env.prod
        required: false

  # 前端构建 (构建完成后自动退出)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/app/dist
    networks:
      - bluebell_net

  # Nginx 反向代理 + 前端静态服务
  nginx:
    image: nginx:alpine
    container_name: bluebell_nginx
    ports:
      - "80:80"
    volumes:
      - ./backend.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - frontend
    networks:
      - bluebell_net
    restart: always


networks:
  bluebell_net:
    driver: bridge

volumes:
  frontend_dist: