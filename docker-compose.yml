services:
  mysql:
    image: mysql:8.0
    container_name: bluebell_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 15939087780Ll@ # 与 config.yaml 保持一致
      MYSQL_DATABASE: bluebell
    ports:
      - "3307:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d # 初始化 SQL 脚本
    restart: always
    networks:
      - bluebell_net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 10s
      retries: 5

  redis:
    image: redis:alpine
    container_name: bluebell_redis
    ports:
      - "6380:6379"
    volumes:
      - ./data/redis:/data
    restart: always
    networks:
      - bluebell_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 10s
      retries: 5

  bluebell:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bluebell_app
    # 移除外部端口，改由 gateway 代理
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bluebell_net
    restart: always

  bluebell_gateway:
    image: nginx:alpine
    container_name: bluebell_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_assets:/usr/share/nginx/html:ro
    depends_on:
      - bluebell
    networks:
      - bluebell_net
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bluebell_frontend
    # 移除端口，前端现在通过 gateway:8081 访问
    volumes:
      - frontend_assets:/usr/share/nginx/html
    depends_on:
      - bluebell_gateway
    networks:
      - bluebell_net
    # 这个容器运行完拷贝任务后会自动退出，这是正常的

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: bluebell_elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - bluebell_net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bluebell_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=bluebell
      - RABBITMQ_DEFAULT_PASS=bluebell123
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    networks:
      - bluebell_net
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: bluebell_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    networks:
      - bluebell_net
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:latest
    container_name: bluebell_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./data/grafana:/var/lib/grafana
    networks:
      - bluebell_net
    depends_on:
      - prometheus
    restart: always

networks:
  bluebell_net:
    driver: bridge

volumes:
  frontend_assets:
