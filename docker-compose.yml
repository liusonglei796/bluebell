services:
  mysql:
    image: mysql:8.0
    container_name: bluebell_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 15939087780Ll@ # 与 config.yaml 保持一致
      MYSQL_DATABASE: bluebell
    ports:
      - "3307:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d # 初始化 SQL 脚本
    restart: always
    networks:
      - bluebell_net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 10s
      retries: 5

  redis:
    image: redis:alpine
    container_name: bluebell_redis
    ports:
      - "6380:6379"
    volumes:
      - ./data/redis:/data
    restart: always
    networks:
      - bluebell_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 10s
      retries: 5

  bluebell:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bluebell_app
    # 移除外部端口，改由 gateway 代理
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bluebell_net
    restart: always

  bluebell_gateway:
    image: nginx:alpine
    container_name: bluebell_gateway
    ports:
      - "8081:80"
    volumes:
      - ./nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_assets:/usr/share/nginx/html:ro
    depends_on:
      - bluebell
    networks:
      - bluebell_net
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bluebell_frontend
    # 移除端口，前端现在通过 gateway:8081 访问
    volumes:
      - frontend_assets:/usr/share/nginx/html
    depends_on:
      - bluebell_gateway
    networks:
      - bluebell_net
    # 这个容器运行完拷贝任务后会自动退出，这是正常的

networks:
  bluebell_net:
    driver: bridge

volumes:
  frontend_assets:
