# --- Elasticsearch 中间件服务定义 ---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
spec:
  ports:
    - port: 9200             # ES 默认 HTTP 端口
  selector:
    app: elasticsearch
---
# --- Elasticsearch 部署定义 ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
spec:
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: bluebell-es:v1      # 使用我们导入 K3s 的本地构建镜像
          imagePullPolicy: IfNotPresent # 关键：优先寻找本地镜像，找不到再尝试拉取
          ports:
            - containerPort: 9200
          env:
            - name: discovery.type
              value: "single-node"   # 告诉 ES 运行在单节点模式，不寻找集群
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m" # 限制 JVM 堆内存，防止 4G 内存的虚拟机 OOM
            - name: xpack.security.enabled
              value: "false"         # 关闭安全验证，方便学习调试
---
# --- RabbitMQ 服务定义 ---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  ports:
    - name: amqp
      port: 5672             # 消息队列传输端口
    - name: management
      port: 15672            # 后台管理界面端口
  selector:
    app: rabbitmq
---
# --- RabbitMQ 部署定义 ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine # 带管理界面的轻量级版本
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: "bluebell"
            - name: RABBITMQ_DEFAULT_PASS
              value: "bluebell123"
