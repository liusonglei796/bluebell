# --- Go 后端业务服务定义 ---
apiVersion: v1
kind: Service
metadata:
  name: bluebell-app
spec:
  ports:
    - port: 8081             # 集群内部供其他 Pod 访问的端口
      targetPort: 8081       # 对应容器内部程序监听的端口
  selector:
    app: bluebell-app
---
# --- Go 后端业务部署定义 ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bluebell-app
spec:
  selector:
    matchLabels:
      app: bluebell-app
  template:
    metadata:
      labels:
        app: bluebell-app
    spec:
      # ⭐ 重要：禁止 K8s 自动注入环境变量（Service Links）
      # K8s 默认会注入类似 REDIS_PORT=tcp://... 的变量，这会覆盖我们手动设置的端口号并导致解析失败
      enableServiceLinks: false
      containers:
        - name: bluebell-app
          image: bluebell-app:v1      # 使用我们本地构建并导入的后端镜像
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:                       # 业务程序需要的配置，通过环境变量动态注入
            - name: MYSQL_HOST
              value: "mysql"         # 指向内网 Service 名 "mysql"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_PASSWD
              value: "15939087780Ll@"
            - name: REDIS_HOST
              value: "redis"         # 指向内网 Service 名 "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB_NAME
              value: "1"
            - name: RABBITMQ_URL
              value: "amqp://bluebell:bluebell123@rabbitmq:5672/"
            - name: ES_ADDRESSES
              value: "http://elasticsearch:9200"
---
# --- Vue 前端服务定义 ---
apiVersion: v1
kind: Service
metadata:
  name: bluebell-frontend
spec:
  ports:
    - port: 80               # 前端标准 HTTP 端口
      targetPort: 80
  selector:
    app: bluebell-frontend
---
# --- Vue 前端部署定义 ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bluebell-frontend
spec:
  selector:
    matchLabels:
      app: bluebell-frontend
  template:
    metadata:
      labels:
        app: bluebell-frontend
    spec:
      enableServiceLinks: false
      containers:
        - name: bluebell-frontend
          image: bluebell-frontend:v1 # 这是我们重写的基于 Nginx 的前端镜像
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
