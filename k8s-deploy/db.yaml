# --- MySQL 数据库服务定义 ---
apiVersion: v1               # 资源版本号，Service 通常是 v1
kind: Service                # 资源类型：服务（负责负载均衡和集群内网发现）
metadata:
  name: mysql                # 服务名，其他 Pod 可以通过 "mysql" 这个域名访问
spec:
  ports:
    - port: 3306             # Service 暴露的端口（集群内部访问端口）
  selector:
    app: mysql               # 核心：通过这个标签“勾住”下面定义的 mysql Pod
  clusterIP: None            # 无头服务 (Headless Service)，直接返回 Pod IP，常用于数据库集群
---
# --- MySQL 部署定义 ---
apiVersion: apps/v1          # Deployment 在 apps/v1 分组下
kind: Deployment             # 资源类型：部署（负责管理 Pod 的生命周期、副本数和滚动更新）
metadata:
  name: mysql                # 部署的名称
spec:
  selector:
    matchLabels:
      app: mysql             # 告诉 Deployment 它负责管理哪些带 "app: mysql" 标签的 Pod
  template:                  # Pod 的模板定义（当需要扩容或重启时，按此模板创建新 Pod）
    metadata:
      labels:
        app: mysql           # 给 Pod 打上标签，必须与上面的 selector 匹配
    spec:
      containers:
        - name: mysql        # 容器名
          image: mysql:8.0   # 使用的官方 MySQL 镜像
          env:               # 环境变量配置（MySQL 初始化需要的参数）
            - name: MYSQL_ROOT_PASSWORD
              value: "15939087780Ll@"
            - name: MYSQL_DATABASE
              value: "bluebell"
          ports:
            - containerPort: 3306 # 容器内部监听的端口
          volumeMounts:      # 挂载磁盘卷（将容器内路径映射到物理存储）
            - name: mysql-data
              mountPath: /var/lib/mysql # MySQL 数据实际存放路径
      volumes:               # 定义卷
        - name: mysql-data
          emptyDir: {}       # 临时目录（仅用于学习，Pod 重启或删除后数据会丢失，生产建议用 PVC）
---
# --- Redis 服务定义 ---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  ports:
    - port: 6379
  selector:
    app: redis
---
# --- Redis 部署定义 ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:alpine # 使用轻量级的 Alpine 版本镜像
          ports:
            - containerPort: 6379
