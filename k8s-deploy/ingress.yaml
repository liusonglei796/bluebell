# --- 集群入口网关配置 (Ingress) ---
apiVersion: networking.k8s.io/v1 # 网络相关资源的标准版本
kind: Ingress                   # 资源类型：入口（充当集群的 HTTP 反向代理/网关）
metadata:
  name: bluebell-ingress
  annotations:
    # 关键配置：指定使用 K3s 自带的 Traefik 入口点 (entrypoint) 为 "web" (即 80 端口)
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:                      # 定义基于 HTTP 协议的路由规则
        paths:
          - path: /api           # 路由 1：所有以 /api 开头的请求
            pathType: Prefix     # 前缀匹配模式
            backend:
              service:
                name: bluebell-app # 转发给内网的 Go 后端服务
                port:
                  number: 8081
          - path: /              # 路由 2：根路径（即剩余所有请求）
            pathType: Prefix
            backend:
              service:
                name: bluebell-frontend # 转发给内网的 Nginx 前端服务
                port:
                  number: 80
