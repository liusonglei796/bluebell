# ============================================
# 本地开发环境 (Local Development)
# Go 程序运行在本地，Docker 只跑基础设施
# 使用: docker compose -f docker-compose.dev.yml up -d
# ============================================
services:
  mysql:
    image: mysql:8.0
    container_name: bluebell_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 15939087780Ll@
      MYSQL_DATABASE: bluebell
    ports:
      - "3307:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    restart: always
    networks:
      - bluebell_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 5

  redis:
    image: redis:alpine
    container_name: bluebell_redis
    ports:
      - "6380:6379"
    volumes:
      - ./data/redis:/data
    restart: always
    networks:
      - bluebell_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bluebell_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: bluebell
      RABBITMQ_DEFAULT_PASS: bluebell123
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    networks:
      - bluebell_net
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: bluebell_elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - bluebell_net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ====== 可观测性基础设施 ======

  # OpenTelemetry Collector — 统一收集入口
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: bluebell_otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - tempo
      - loki
      - mimir
    networks:
      - bluebell_net
    restart: always

  # Tempo — 分布式追踪后端
  tempo:
    image: grafana/tempo:2.10.4
    container_name: bluebell_tempo
    command: ["-config.file=/etc/tempo/tempo-config.yaml"]
    volumes:
      - ./tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
    ports:
      - "3200:3200"
    networks:
      - bluebell_net
    restart: always

  # Loki — 日志聚合后端
  loki:
    image: grafana/loki:latest
    container_name: bluebell_loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"
    networks:
      - bluebell_net
    restart: always

  # Mimir — 指标后端
  mimir:
    image: grafana/mimir:latest
    container_name: bluebell_mimir
    command: ["-config.file=/etc/mimir/mimir-config.yaml"]
    volumes:
      - ./mimir-config.yaml:/etc/mimir/mimir-config.yaml:ro
    ports:
      - "9009:9009"
    networks:
      - bluebell_net
    restart: always

  # Pyroscope — 持续性能剖析后端
  pyroscope:
    image: grafana/pyroscope:latest
    container_name: bluebell_pyroscope
    ports:
      - "4040:4040"
    networks:
      - bluebell_net
    restart: always

  # Grafana — 统一可视化仪表盘
  grafana:
    image: grafana/grafana:latest
    container_name: bluebell_grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - tempo
      - loki
      - mimir
      - pyroscope
    networks:
      - bluebell_net
    restart: always

networks:
  bluebell_net:
    driver: bridge