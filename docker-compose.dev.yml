# ============================================
# 本地开发环境 (Local Development)
# Go 程序运行在本地，Docker 只跑基础设施
# 使用: docker compose -f docker-compose.dev.yml up -d
# ============================================
services:
  mysql:
    image: mysql:8.0
    container_name: bluebell_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 15939087780Ll@
      MYSQL_DATABASE: bluebell
    ports:
      - "3307:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    restart: always
    networks:
      - bluebell_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 5

  redis:
    image: redis:alpine
    container_name: bluebell_redis
    ports:
      - "6380:6379"
    volumes:
      - ./data/redis:/data
    restart: always
    networks:
      - bluebell_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bluebell_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: bluebell
      RABBITMQ_DEFAULT_PASS: bluebell123
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    networks:
      - bluebell_net
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: bluebell_elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - bluebell_net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  # 可选: 链路追踪 (开发调试用)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: bluebell_otel_collector
    command: ["--config", "/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - bluebell_net
    restart: always

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: bluebell_jaeger
    ports:
      - "16686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - bluebell_net
    restart: always

networks:
  bluebell_net:
    driver: bridge