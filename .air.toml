root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main.exe ./cmd/bluebell/"
bin = "./tmp/main.exe"
args = ["-conf", "./config.yaml"]
include_ext = ["go", "tpl", "tmpl", "html", "yaml"]
exclude_dir = ["assets", "tmp", "vendor", "frontend/node_modules", "教学文档", ".git", "data", "docs", "design-system", "sql", "node_modules", "bin", "pkg", "frontend"]
exclude_file = ["bluebell.log", "web_app.log", "GEMINI.md"]
delay = 1000
stop_on_error = true
log = "air_errors.log"
include_dir = ["cmd", "internal", "config"]

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
