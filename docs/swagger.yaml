basePath: /api/v1
definitions:
  backfront.ResponseData:
    properties:
      code:
        description: 业务响应状态码
        type: integer
      data:
        description: 数据
      msg:
        description: 提示信息
    type: object
  communityResp.Response:
    properties:
      create_time:
        type: string
      id:
        type: string
      introduction:
        type: string
      name:
        type: string
    type: object
  communityreq.CreateCommunityRequest:
    properties:
      introduction:
        type: string
      name:
        type: string
    required:
    - introduction
    - name
    type: object
  postResp.DetailResponse:
    properties:
      author_id:
        type: string
      author_name:
        description: 作者名称
        type: string
      community_id:
        type: integer
      content:
        type: string
      create_time:
        type: string
      id:
        type: string
      status:
        type: integer
      title:
        type: string
      vote_num:
        description: 投票数（赞成票数）
        type: integer
    type: object
  postreq.CreatePostRequest:
    properties:
      community_id:
        type: integer
      content:
        type: string
      title:
        type: string
    required:
    - community_id
    - content
    - title
    type: object
  postreq.VoteRequest:
    properties:
      direction:
        enum:
        - 1
        - 0
        - -1
        type: integer
      post_id:
        type: integer
    required:
    - direction
    - post_id
    type: object
  userreq.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  userreq.SignUpRequest:
    properties:
      password:
        type: string
      re_password:
        type: string
      username:
        type: string
    required:
    - password
    - re_password
    - username
    type: object
host: 127.0.0.1:8080
info:
  contact:
    email: 这里写联系人邮箱
    name: 这里写联系人姓名
    url: http://www.swagger.io/support
  description: Go语言实战项目——社区web框架
  termsOfService: http://swagger.io/terms/
  title: bluebell项目接口文档
  version: "1.0"
paths:
  /community:
    get:
      consumes:
      - application/json
      description: 获取所有社区的列表
      parameters:
      - description: Bearer 用户令牌
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/backfront.ResponseData'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/communityResp.Response'
                  type: array
              type: object
      summary: 获取社区列表
      tags:
      - 社区相关
    post:
      consumes:
      - application/json
      description: 创建一个新的社区（仅管理员）
      parameters:
      - description: Bearer 用户令牌
        in: header
        name: Authorization
        required: true
        type: string
      - description: 社区参数
        in: body
        name: object
        required: true
        schema:
          $ref: '#/definitions/communityreq.CreateCommunityRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backfront.ResponseData'
      summary: 创建社区
      tags:
      - 社区相关
  /community/{id}:
    get:
      consumes:
      - application/json
      description: 根据社区ID获取社区详细信息
      parameters:
      - description: Bearer 用户令牌
        in: header
        name: Authorization
        required: true
        type: string
      - description: 社区ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/backfront.ResponseData'
            - properties:
                data:
                  $ref: '#/definitions/communityResp.Response'
              type: object
      summary: 获取社区详情
      tags:
      - 社区相关
  /login:
    post:
      consumes:
      - application/json
      description: 用户登录并获取令牌
      parameters:
      - description: 登录参数
        in: body
        name: object
        required: true
        schema:
          $ref: '#/definitions/userreq.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backfront.ResponseData'
      summary: 用户登录
      tags:
      - 用户相关
  /post:
    post:
      consumes:
      - application/json
      description: 创建一个新的帖子
      parameters:
      - description: Bearer 用户令牌
        in: header
        name: Authorization
        required: true
        type: string
      - description: 帖子参数
        in: body
        name: object
        required: true
        schema:
          $ref: '#/definitions/postreq.CreatePostRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backfront.ResponseData'
      summary: 创建帖子
      tags:
      - 帖子相关
  /post/{id}:
    delete:
      consumes:
      - application/json
      description: 根据ID删除帖子（软删除）
      parameters:
      - description: Bearer 用户令牌
        in: header
        name: Authorization
        required: true
        type: string
      - description: 帖子ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backfront.ResponseData'
      summary: 删除帖子
      tags:
      - 帖子相关
    get:
      consumes:
      - application/json
      description: 根据ID获取帖子详细信息
      parameters:
      - description: Bearer 用户令牌
        in: header
        name: Authorization
        required: true
        type: string
      - description: 帖子ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/backfront.ResponseData'
            - properties:
                data:
                  $ref: '#/definitions/postResp.DetailResponse'
              type: object
      summary: 获取帖子详情
      tags:
      - 帖子相关
  /posts:
    get:
      consumes:
      - application/json
      description: 分页获取帖子列表，可按时间或分数排序
      parameters:
      - description: Bearer 用户令牌
        in: header
        name: Authorization
        required: true
        type: string
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: size
        type: integer
      - description: 排序方式 (time/score)
        in: query
        name: order
        type: string
      - description: 社区ID
        in: query
        name: community_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/backfront.ResponseData'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/postResp.DetailResponse'
                  type: array
              type: object
      summary: 获取帖子列表
      tags:
      - 帖子相关
  /refresh_token:
    post:
      consumes:
      - application/json
      description: 使用刷新令牌获取新的访问令牌
      parameters:
      - description: Bearer 用户令牌
        in: header
        name: Authorization
        required: true
        type: string
      - description: 刷新令牌
        in: query
        name: refresh_token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backfront.ResponseData'
      summary: 刷新令牌
      tags:
      - 用户相关
  /signup:
    post:
      consumes:
      - application/json
      description: 注册新用户
      parameters:
      - description: 注册参数
        in: body
        name: object
        required: true
        schema:
          $ref: '#/definitions/userreq.SignUpRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backfront.ResponseData'
      summary: 用户注册
      tags:
      - 用户相关
  /vote:
    post:
      consumes:
      - application/json
      description: 为帖子点赞或踩
      parameters:
      - description: Bearer 用户令牌
        in: header
        name: Authorization
        required: true
        type: string
      - description: 投票参数
        in: body
        name: object
        required: true
        schema:
          $ref: '#/definitions/postreq.VoteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backfront.ResponseData'
      summary: 帖子投票
      tags:
      - 帖子相关
swagger: "2.0"
