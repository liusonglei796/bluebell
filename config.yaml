app:
  name: "bluebell"
  port: 8080
  mode: "dev"

snowflake:
  start_time: 1775539200000
  machine_id: 1

log:
  level: "debug"
  file_name: "bluebell.log"
  max_size: 100
  max_backups: 7
  max_age: 30

mysql:
  host: "127.0.0.1"
  port: 3307
  passwd: "15939087780Ll@"
  db_name: "bluebell"
  user: "root"
  max_open_conns: 50
  max_idle_conns: 25

redis:
  host: "127.0.0.1"
  port: 6380
  password: ""
  db_name: 1
  pool_size: 200

ratelimit:
  # 彻底关闭限流，观察物理瓶颈
  fill_interval: "1ns"
  capacity: 999999999999

sliding_ratelimit:
  enabled: true
  window: "60s"
  limit: 100

timeout:
  timeout: "30s"

jwt:
  secret: "bluebell_secret_key_change_in_prod"
  access_expiry: "120m"
  refresh_expiry: "168h"

rabbitmq:
  url: "amqp://bluebell:bluebell123@localhost:5672/"

es:
  addresses:
    - "http://localhost:9200"
  username: ""
  password: ""

otel:
  enabled: true
  endpoint: "localhost:4317"
  service_name: "bluebell"

pyroscope:
  enabled: true
  endpoint: "http://localhost:4040"
  service_name: "bluebell"

upload:
  dir: "uploads"
  max_size: 10485760
  allowed_exts:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".gif"
    - ".webp"
